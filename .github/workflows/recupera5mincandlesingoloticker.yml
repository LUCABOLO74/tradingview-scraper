name: Get LDO.MI OHLCV

on:
  workflow_dispatch:

jobs:
  get-ldo-mi-ohlcv:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install tradingview-scraper

      - name: Get first candle OHLCV
        run: |
          python - <<'PY'
          import json
          import sys
          from tradingview_scraper.symbols.stream.price import RealTimeData

          try:
              rt = RealTimeData()

              data = rt.get_ohlcv(
                  symbol="LDO.MI",
                  timeframe="1d",
                  bars=1
              )

              first_candle = data[0] if isinstance(data, list) and len(data) > 0 else data

              print(json.dumps({
                  "symbol": "LDO.MI",
                  "timeframe": "1d",
                  "first_candle": first_candle
              }, indent=2, ensure_ascii=False, default=str))

          except Exception as e:
              print("ERROR:", str(e))
              sys.exit(1)
          PY
