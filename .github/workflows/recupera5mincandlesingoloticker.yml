name: Debug LDO.MI first packets

on:
  workflow_dispatch:

jobs:
  debug-packets:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install tradingview-scraper

      - name: Print first 3 packets
        run: |
          python - <<'PY'
          import json
          import sys
          from tradingview_scraper.symbols.stream.price import RealTimeData

          try:
              rt = RealTimeData()
              stream = rt.get_ohlcv("LDO.MI")

              packets = []
              for _ in range(3):
                  packets.append(next(stream))

              print(json.dumps({
                  "symbol": "LDO.MI",
                  "packets": packets
              }, indent=2, ensure_ascii=False, default=str))

          except StopIteration:
              print("ERROR: Stream terminato prima di 3 pacchetti")
              sys.exit(1)
          except Exception as e:
              print("ERROR:", str(e))
              sys.exit(1)
          PY
