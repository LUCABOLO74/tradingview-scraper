name: Get MIL:LDO first candle

on:
  workflow_dispatch:

jobs:
  get-first-candle:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install tradingview-scraper

      - name: Read first packets for MIL:LDO
        run: |
          python - <<'PY'
          import json
          import sys
          from tradingview_scraper.symbols.stream.price import RealTimeData

          try:
              rt = RealTimeData()
              stream = rt.get_ohlcv("MIL:LDO")

              packets = []
              for _ in range(5):
                  packets.append(next(stream))

              print(json.dumps({
                  "symbol": "MIL:LDO",
                  "packets": packets
              }, indent=2, ensure_ascii=False, default=str))

          except StopIteration:
              print("ERROR: Stream terminato prima di 5 pacchetti")
              sys.exit(1)
          except Exception as e:
              print("ERROR:", str(e))
              sys.exit(1)
          PY
